name: Setup build environment
description: Setup Bun, Python, install dependencies, and configure caching

inputs:
  scope:
    description: '"all" installs everything; "js" skips Python/uv (for jobs that only need JS tooling)'
    required: false
    default: all

# Set an empty permissions block to enforce least privilege
permissions: {}

runs:
  using: composite

  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: 1.3.14

    - name: Install uv
      if: inputs.scope == 'all'
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: "0.11.23"
        enable-cache: true

    - name: Install Python
      if: inputs.scope == 'all'
      shell: bash
      run: uv python install

    - name: Install JS dependencies
      shell: bash
      run: bun install --frozen-lockfile --ignore-scripts

    - name: Install Python dependencies
      if: inputs.scope == 'all'
      shell: bash
      run: uv sync --frozen
