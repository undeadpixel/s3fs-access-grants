name: release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    # changesets/action needs contents:write (push the version branch) and
    # pull-requests:write (open the "version packages" PR) via the default
    # GITHUB_TOKEN — this works because the repo allows Actions to create PRs.
    # id-token:write is for PyPI trusted publishing (OIDC).
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    environment: pypi
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup

      # Opens/updates the "version packages" PR while changesets are pending.
      # Once that PR merges (no changesets left), `version` is a no-op and
      # `publish` runs `changeset tag`, setting outputs.published=true.
      - id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: node scripts/ci-bump-versions.js
          publish: bunx changeset tag
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build distribution
        if: steps.changesets.outputs.published == 'true'
        run: uv build

      # Trusted publishing (OIDC): no API token. Configure a PyPI publisher
      # for this repo + the "pypi" environment first.
      - name: Publish to PyPI
        if: steps.changesets.outputs.published == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
