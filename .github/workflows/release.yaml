name: release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

# RELEASE_TOKEN (PAT) is used for both the persisted git credential
# written by actions/checkout (so git push to changeset-release/main works)
# and for changesets/action's Octokit calls. The default GITHUB_TOKEN
# stays read-only.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    # OIDC token for PyPI trusted publishing; id-token must be writable.
    permissions:
      contents: read
      id-token: write
    environment: pypi
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: ./.github/actions/setup

      # Opens/updates the "version packages" PR while changesets are pending.
      # Once that PR merges (no changesets left), `version` is a no-op and
      # `publish` runs `changeset tag`, setting outputs.published=true.
      - id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: node scripts/ci-bump-versions.js
          publish: bunx changeset tag
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Build distribution
        if: steps.changesets.outputs.published == 'true'
        run: uv build

      # Trusted publishing (OIDC): no API token. Configure a PyPI publisher
      # for this repo + the "pypi" environment first.
      - name: Publish to PyPI
        if: steps.changesets.outputs.published == 'true'
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdf1 # v1.12.4
